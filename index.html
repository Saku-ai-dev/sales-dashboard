<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上管理ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; background: #f4f6f9; color: #333; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e0e4ea; padding: 18px 32px; display: flex; align-items: center; gap: 12px; }
    header .logo { width: 32px; height: 32px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    header .logo svg { width: 18px; height: 18px; fill: #fff; }
    header h1 { font-size: 1.25rem; font-weight: 700; color: #1e293b; }
    header .year-badge { margin-left: auto; background: #eff6ff; color: #3b82f6; font-size: 0.8rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1px solid #bfdbfe; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 48px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; border: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .card .label { font-size: 0.78rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .card .value { font-size: 1.75rem; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .card .sub { font-size: 0.8rem; color: #94a3b8; }
    .card.accent-blue  { border-top: 3px solid #3b82f6; } .card.accent-blue  .value { color: #2563eb; }
    .card.accent-green { border-top: 3px solid #10b981; } .card.accent-green .value { color: #059669; }
    .card.accent-amber { border-top: 3px solid #f59e0b; } .card.accent-amber .value { color: #d97706; }
    .section { background: #fff; border-radius: 12px; padding: 28px; border: 1px solid #e8ecf0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 28px; }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; }
    .chart-wrap { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 16px; text-align: left; border-bottom: 1px solid #e8ecf0; }
    thead th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 12px 16px; color: #334155; }
    tbody td:not(:first-child) { text-align: right; }
    .month-cell { font-weight: 600; color: #1e293b; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
    .badge.up   { background: #dcfce7; color: #16a34a; }
    .badge.down { background: #fee2e2; color: #dc2626; }
    .badge.flat { background: #f1f5f9; color: #64748b; }
    .highlight-row { background: #fffbeb !important; }
    @media (max-width: 700px) {
      .cards { grid-template-columns: 1fr; }
      header { padding: 14px 16px; }
      main { padding: 16px 12px 40px; }
      .section { padding: 18px 14px; }
      .chart-wrap { height: 220px; }
      thead th, tbody td { padding: 9px 10px; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M3 13h2v8H3v-8zm4-6h2v14H7V7zm4-4h2v18h-2V3zm4 8h2v10h-2v-10zm4-4h2v14h-2V7z"/></svg>
  </div>
  <h1>売上管理ダッシュボード</h1>
  <span class="year-badge">2025年度</span>
</header>
<main>
  <div class="cards">
    <div class="card accent-blue">
      <div class="label">年間総売上</div>
      <div class="value" id="totalSales">—</div>
      <div class="sub">2025年 1月〜12月</div>
    </div>
    <div class="card accent-green">
      <div class="label">月平均売上</div>
      <div class="value" id="avgSales">—</div>
      <div class="sub">12ヶ月平均</div>
    </div>
    <div class="card accent-amber">
      <div class="label">最高月売上</div>
      <div class="value" id="maxSales">—</div>
      <div class="sub" id="maxMonth">—</div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">月別売上推移</div>
    <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
  </div>
  <div class="section">
    <div class="section-title">月別売上一覧</div>
    <table>
      <thead><tr><th>月</th><th>売上金額</th><th>前月比</th></tr></thead>
      <tbody id="salesTable"></tbody>
    </table>
  </div>
</main>
<script>
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const sales  = [3820, 3150, 4210, 4580, 4390, 5020, 4760, 4130, 4870, 5340, 6120, 7250];
  const fmtM   = v => v.toLocaleString('ja-JP') + '万円';
  const total  = sales.reduce((a,b)=>a+b,0);
  const avg    = Math.round(total/sales.length);
  const max    = Math.max(...sales);
  const maxIdx = sales.indexOf(max);
  document.getElementById('totalSales').textContent = fmtM(total);
  document.getElementById('avgSales').textContent   = fmtM(avg);
  document.getElementById('maxSales').textContent   = fmtM(max);
  document.getElementById('maxMonth').textContent   = '最高月：' + months[maxIdx];
  new Chart(document.getElementById('salesChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{
        label: '売上（万円）',
        data: sales,
        backgroundColor: sales.map((_,i) => i===maxIdx ? '#f59e0b' : '#3b82f6'),
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ' ' + c.parsed.y.toLocaleString('ja-JP') + ' 万円' } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 12 } } },
        y: { beginAtZero: false, min: 2500, grid: { color: '#f1f5f9' },
             ticks: { color: '#64748b', font: { size: 11 }, callback: v => v.toLocaleString('ja-JP') } }
      }
    }
  });
  const tbody = document.getElementById('salesTable');
  sales.forEach((v,i) => {
    const prev  = i===0 ? null : sales[i-1];
    const ratio = prev===null ? null : ((v-prev)/prev*100).toFixed(1);
    let badge = '<span class="badge flat">—</span>';
    if (ratio !== null) {
      const r = parseFloat(ratio);
      if (r > 0)      badge = '<span class="badge up">▲ '+ratio+'%</span>';
      else if (r < 0) badge = '<span class="badge down">▼ '+Math.abs(ratio)+'%</span>';
      else            badge = '<span class="badge flat">± 0.0%</span>';
    }
    const tr = document.createElement('tr');
    if (i===maxIdx) tr.classList.add('highlight-row');
    tr.innerHTML = '<td class="month-cell">'+months[i]+'</td><td>'+fmtM(v)+'</td><td>'+badge+'</td>';
    tbody.appendChild(tr);
  });
</script>
</body>
</html>
